<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>English Check-in</title>
    <style>
:root {
  --ink: #25313b;
  --muted: #60717f;
  --paper: #fffdf7;
  --surface: #ffffff;
  --line: #d9e1df;
  --teal: #197c7a;
  --teal-soft: #dff3ef;
  --gold: #f4b942;
  --coral: #e96c4c;
  --blue: #3f6fb5;
  --shadow: 0 18px 40px rgba(37, 49, 59, 0.12);
}

* {
  box-sizing: border-box;
}

body {
  position: relative;
  margin: 0;
  color: var(--ink);
  background:
    linear-gradient(115deg, rgba(255, 253, 247, 0.92) 0 24%, rgba(232, 246, 241, 0.84) 24% 48%, rgba(255, 245, 221, 0.9) 48% 72%, rgba(242, 248, 255, 0.9) 72%),
    radial-gradient(circle at 12% 10%, rgba(244, 185, 66, 0.22), transparent 30%),
    linear-gradient(135deg, #f8f3e7 0%, #e9f4f2 45%, #f9efe7 100%);
  font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
}

body::before {
  content: "张梓萱的英语世界";
  position: fixed;
  right: -34px;
  bottom: 28px;
  z-index: -1;
  color: rgba(25, 124, 122, 0.08);
  font-size: clamp(48px, 11vw, 160px);
  font-weight: 900;
  letter-spacing: 0;
  transform: rotate(-7deg);
  white-space: nowrap;
}

button {
  font: inherit;
}

.app-shell {
  width: min(1120px, calc(100% - 32px));
  margin: 0 auto;
  padding: 28px 0 40px;
}

.hero {
  display: grid;
  grid-template-columns: 1fr minmax(220px, 280px);
  gap: 20px;
  align-items: end;
  min-height: 180px;
}

.eyebrow {
  margin: 0 0 8px;
  color: var(--teal);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0;
  text-transform: uppercase;
}

.brand-banner {
  display: inline-flex;
  margin: 0 0 14px;
  border: 1px solid rgba(25, 124, 122, 0.22);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.72);
  color: var(--teal);
  padding: 8px 14px;
  font-size: 16px;
  font-weight: 800;
}

h1,
h2,
h3,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 10px;
  font-size: clamp(38px, 7vw, 74px);
  line-height: 0.95;
  letter-spacing: 0;
}

h2 {
  margin-bottom: 10px;
  font-size: 28px;
  letter-spacing: 0;
}

h3 {
  margin-bottom: 12px;
  font-size: 18px;
  letter-spacing: 0;
}

.hero-copy,
.goal,
.practice-note,
.complete-note {
  color: var(--muted);
  line-height: 1.7;
}

.fallback-panel {
  display: grid;
  gap: 8px;
  margin: 16px 0 20px;
  border: 1px solid rgba(233, 108, 76, 0.45);
  border-radius: 8px;
  background: #fff0ea;
  padding: 14px;
}

.fallback-panel strong {
  color: #87381f;
}

.fallback-panel span {
  color: var(--ink);
  line-height: 1.6;
}

.fallback-panel button {
  justify-self: start;
  border: 0;
  border-radius: 8px;
  background: var(--coral);
  color: #ffffff;
  cursor: pointer;
  padding: 10px 12px;
}

.progress-panel,
.lesson-card,
.practice-card {
  border: 1px solid rgba(217, 225, 223, 0.9);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.88);
  box-shadow: var(--shadow);
}

.progress-panel {
  padding: 18px;
}

.progress-label {
  display: block;
  margin-bottom: 8px;
  color: var(--muted);
  font-size: 14px;
}

.unit-picker-label {
  display: block;
  margin-bottom: 8px;
  color: var(--muted);
  font-size: 14px;
}

.unit-picker {
  width: 100%;
  margin-bottom: 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #ffffff;
  color: var(--ink);
  padding: 10px 12px;
}

.progress-panel strong {
  display: block;
  margin-bottom: 14px;
  font-size: 34px;
}

.progress-track {
  height: 10px;
  overflow: hidden;
  border-radius: 999px;
  background: #e8ece9;
}

.progress-track span {
  display: block;
  width: 0%;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--teal), var(--gold));
}

.day-tabs {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 8px;
  margin: 24px 0;
}

.day-tab {
  min-height: 52px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--ink);
  background: var(--surface);
  cursor: pointer;
}

.day-tab.active {
  border-color: var(--teal);
  color: #ffffff;
  background: var(--teal);
}

.day-tab.done::after {
  content: "完成";
  display: block;
  margin-top: 2px;
  font-size: 12px;
  color: inherit;
}

.today-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(320px, 380px);
  gap: 20px;
}

.lesson-card,
.practice-card {
  padding: 22px;
}

.lesson-heading {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: start;
}

.ghost-button {
  min-width: 88px;
  border: 1px solid var(--teal);
  border-radius: 8px;
  color: var(--teal);
  background: var(--teal-soft);
  cursor: pointer;
  padding: 10px 12px;
}

.routine {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 8px;
  margin: 16px 0 24px;
}

.routine-step {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px;
  background: var(--paper);
}

.routine-step strong {
  display: block;
  margin-bottom: 4px;
  color: var(--teal);
}

.routine-step span {
  color: var(--muted);
  font-size: 12px;
}

.block {
  margin-top: 20px;
}

.chip-row {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 8px;
}

.chip {
  border-radius: 999px;
  background: #edf1f5;
  padding: 8px 12px;
  font-size: 14px;
}

.review-audio {
  min-height: 70px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #ffffff;
  color: var(--ink);
  cursor: pointer;
  padding: 10px;
  text-align: left;
}

.review-audio strong {
  display: block;
  font-size: 15px;
}

.review-audio span {
  display: block;
  margin-top: 5px;
  color: var(--muted);
  font-size: 12px;
}

.item-list {
  display: grid;
  gap: 10px;
}

.learn-item {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto auto;
  gap: 8px;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px;
  background: #ffffff;
}

.learn-item strong {
  display: block;
  font-size: 18px;
}

.learn-item span {
  display: block;
  margin-top: 4px;
  color: var(--muted);
  font-size: 14px;
}

.audio-button {
  border: 0;
  border-radius: 8px;
  background: var(--blue);
  color: white;
  cursor: pointer;
  padding: 10px 12px;
}

.audio-button.slow {
  background: var(--coral);
}

.quiz-item {
  margin-bottom: 16px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px;
  background: var(--paper);
}

.quiz-prompt {
  margin-bottom: 10px;
  font-weight: 700;
  line-height: 1.6;
}

.choice {
  display: block;
  width: 100%;
  margin-top: 8px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #ffffff;
  cursor: pointer;
  padding: 10px;
  text-align: left;
}

.choice.correct {
  border-color: var(--teal);
  background: var(--teal-soft);
}

.choice.wrong {
  border-color: var(--coral);
  background: #fff0ea;
}

.complete-button {
  width: 100%;
  border: 0;
  border-radius: 8px;
  background: var(--teal);
  color: #ffffff;
  cursor: pointer;
  padding: 14px 16px;
  font-weight: 700;
}

.complete-note {
  margin: 12px 0 0;
  text-align: center;
}

@media (max-width: 860px) {
  .hero,
  .today-layout {
    grid-template-columns: 1fr;
  }

  .day-tabs {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .routine {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .chip-row {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 560px) {
  .app-shell {
    width: min(100% - 20px, 1120px);
    padding-top: 18px;
  }

  .day-tabs {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .learn-item {
    grid-template-columns: 1fr;
  }

  .chip-row {
    grid-template-columns: 1fr;
  }
}

    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="brand-banner">张梓萱的英语世界</p>
          <p class="eyebrow" id="unitMeta">Grade 7</p>
          <h1 id="unitTitle">English Check-in</h1>
          <p class="hero-copy" id="unitCopy">每天 25 分钟：听词、跟读、做 3 道小题，然后自己打卡。</p>
        </div>
        <div class="progress-panel" aria-label="学习进度">
          <label class="unit-picker-label" for="unitPicker">选择内容</label>
          <select id="unitPicker" class="unit-picker"></select>
          <span class="progress-label">已完成</span>
          <strong id="doneCount">0 / 7</strong>
          <div class="progress-track"><span id="progressBar"></span></div>
        </div>
      </header>

      <section class="day-tabs" id="dayTabs" aria-label="选择学习天数"></section>

      <section class="today-layout">
        <article class="lesson-card">
          <div class="lesson-heading">
            <div>
              <p class="eyebrow" id="lessonMeta">Day 1</p>
              <h2 id="lessonTitle">加载中</h2>
            </div>
            <button class="ghost-button" id="fallbackButton" type="button">保底版</button>
          </div>

          <p class="goal" id="lessonGoal"></p>
          <div class="fallback-panel" id="fallbackPanel" hidden></div>

          <div class="routine" id="routine"></div>

          <section class="block" id="reviewBlock" hidden>
            <h3>旧词复习</h3>
            <div class="chip-row" id="reviewList"></div>
          </section>

          <section class="block">
            <h3>今日词/短语</h3>
            <div class="item-list" id="termList"></div>
          </section>

          <section class="block">
            <h3>跟读句子</h3>
            <div class="item-list" id="sentenceList"></div>
          </section>
        </article>

        <aside class="practice-card">
          <h2>小练习</h2>
          <p class="practice-note">先自己选，再看反馈。做错也没关系。</p>
          <div id="quizList"></div>
          <button class="complete-button" id="completeButton" type="button">我今天完成了</button>
          <p class="complete-note" id="completeNote"></p>
        </aside>
      </section>
    </main>

    <script>
const state = {
  manifest: null,
  unitEntry: null,
  data: null,
  activeDayIndex: 0,
  audio: null,
  done: new Set(),
};

const elements = {
  unitMeta: document.querySelector("#unitMeta"),
  unitTitle: document.querySelector("#unitTitle"),
  unitCopy: document.querySelector("#unitCopy"),
  unitPicker: document.querySelector("#unitPicker"),
  dayTabs: document.querySelector("#dayTabs"),
  doneCount: document.querySelector("#doneCount"),
  progressBar: document.querySelector("#progressBar"),
  lessonMeta: document.querySelector("#lessonMeta"),
  lessonTitle: document.querySelector("#lessonTitle"),
  lessonGoal: document.querySelector("#lessonGoal"),
  fallbackPanel: document.querySelector("#fallbackPanel"),
  fallbackButton: document.querySelector("#fallbackButton"),
  routine: document.querySelector("#routine"),
  reviewBlock: document.querySelector("#reviewBlock"),
  reviewList: document.querySelector("#reviewList"),
  termList: document.querySelector("#termList"),
  sentenceList: document.querySelector("#sentenceList"),
  quizList: document.querySelector("#quizList"),
  completeButton: document.querySelector("#completeButton"),
  completeNote: document.querySelector("#completeNote"),
};

function doneKey() {
  return `englishCheckin.${state.data.id}.doneDays`;
}

function loadDone() {
  try {
    state.done = new Set(JSON.parse(localStorage.getItem(doneKey()) || "[]"));
  } catch {
    state.done = new Set();
  }
}

function saveDone() {
  try {
    localStorage.setItem(doneKey(), JSON.stringify([...state.done]));
  } catch {
    // Some file:// browser contexts disable localStorage. The page can still be used.
  }
}

function updateProgress() {
  const total = state.data.days.length;
  const done = state.done.size;
  elements.doneCount.textContent = `${done} / ${total}`;
  elements.progressBar.style.width = `${(done / total) * 100}%`;
}

function playAudio(path, rate = 1) {
  if (state.audio) {
    state.audio.pause();
  }
  const prefix = window.ENGLISH_CHECKIN_AUDIO_PREFIX || "";
  const audioPath = /^https?:|^file:|^\//.test(path) ? path : `${prefix}${path}`;
  state.audio = new Audio(audioPath);
  state.audio.playbackRate = rate;
  state.audio.play().catch(() => {
    elements.completeNote.textContent = "音频暂时无法播放，请确认已生成 MP3，并通过本地服务器打开页面。";
  });
}

function audioMap() {
  const items = new Map();
  state.data.days.forEach((day) => {
    [...day.terms, ...day.sentences].forEach((item) => {
      if (!items.has(item.english)) {
        items.set(item.english, item);
      }
    });
  });
  return items;
}

function renderUnitPicker() {
  elements.unitPicker.innerHTML = "";
  state.manifest.units.forEach((unit) => {
    const option = document.createElement("option");
    option.value = unit.id;
    option.textContent = `${unit.label} · ${unit.title}`;
    option.selected = unit.id === state.unitEntry.id;
    elements.unitPicker.appendChild(option);
  });
  elements.unitPicker.onchange = () => loadUnit(elements.unitPicker.value);
}

function renderTabs() {
  elements.dayTabs.innerHTML = "";
  state.data.days.forEach((day, index) => {
    const button = document.createElement("button");
    button.type = "button";
    button.className = "day-tab";
    button.textContent = `Day ${day.day}`;
    if (index === state.activeDayIndex) button.classList.add("active");
    if (state.done.has(day.id)) button.classList.add("done");
    button.addEventListener("click", () => {
      state.activeDayIndex = index;
      render();
    });
    elements.dayTabs.appendChild(button);
  });
}

function renderRoutine() {
  elements.routine.innerHTML = "";
  state.data.routine.forEach((step) => {
    const item = document.createElement("div");
    item.className = "routine-step";
    item.innerHTML = `<strong>${step.minutes} 分钟 · ${step.label}</strong><span>${step.detail}</span>`;
    elements.routine.appendChild(item);
  });
}

function renderReview(day) {
  elements.reviewList.innerHTML = "";
  elements.reviewBlock.hidden = day.review.length === 0;
  const knownAudio = audioMap();
  day.review.forEach((word) => {
    const known = typeof word === "string" ? knownAudio.get(word) : word;
    const english = typeof word === "string" ? word : word.english;
    const chinese = known?.chinese || "旧词复习";
    const audio = known?.audio;
    const item = document.createElement("button");
    item.type = "button";
    item.className = "review-audio";
    item.innerHTML = `<strong>${english}</strong><span>${chinese}</span>`;
    item.addEventListener("click", () => {
      if (audio) {
        playAudio(audio, 0.9);
      } else {
        elements.completeNote.textContent = "这个旧词还没有音频，后续会补齐。";
      }
    });
    elements.reviewList.appendChild(item);
  });
}

function renderLearnItems(container, items) {
  container.innerHTML = "";
  items.forEach((item) => {
    const row = document.createElement("div");
    row.className = "learn-item";
    row.innerHTML = `
      <div>
        <strong>${item.english}</strong>
        <span>${item.chinese}</span>
      </div>
      <button class="audio-button" type="button">播放</button>
      <button class="audio-button slow" type="button">慢速</button>
    `;
    const [normal, slow] = row.querySelectorAll("button");
    normal.addEventListener("click", () => playAudio(item.audio, 1));
    slow.addEventListener("click", () => playAudio(item.audio, 0.82));
    container.appendChild(row);
  });
}

function renderQuiz(day) {
  elements.quizList.innerHTML = "";
  day.quiz.forEach((quiz, quizIndex) => {
    const wrap = document.createElement("div");
    wrap.className = "quiz-item";
    const prompt = document.createElement("div");
    prompt.className = "quiz-prompt";
    prompt.textContent = `${quizIndex + 1}. ${quiz.prompt}`;
    wrap.appendChild(prompt);

    quiz.choices.forEach((choice, choiceIndex) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "choice";
      button.textContent = choice;
      button.addEventListener("click", () => {
        [...wrap.querySelectorAll(".choice")].forEach((el) => {
          el.classList.remove("correct", "wrong");
        });
        button.classList.add(choiceIndex === quiz.answer ? "correct" : "wrong");
      });
      wrap.appendChild(button);
    });
    elements.quizList.appendChild(wrap);
  });
}

function render() {
  const day = state.data.days[state.activeDayIndex];
  elements.unitMeta.textContent = `${state.data.level} · ${state.data.unit}`;
  elements.unitTitle.textContent = state.data.title;
  elements.unitCopy.textContent = `每天 ${state.data.dailyMinutes} 分钟：听词、跟读、做小练习，然后自己打卡。`;

  renderUnitPicker();
  renderTabs();
  renderRoutine();
  renderReview(day);
  renderLearnItems(elements.termList, day.terms);
  renderLearnItems(elements.sentenceList, day.sentences);
  renderQuiz(day);

  elements.lessonMeta.textContent = `Day ${day.day} · ${state.data.dailyMinutes} 分钟`;
  elements.lessonTitle.textContent = day.title;
  elements.lessonGoal.textContent = day.goal;
  elements.fallbackPanel.hidden = true;
  elements.fallbackPanel.innerHTML = "";
  elements.completeNote.textContent = state.done.has(day.id) ? "今天已经完成，可以在纸上打勾。" : "";
  elements.fallbackButton.onclick = () => {
    elements.fallbackPanel.hidden = false;
    elements.fallbackPanel.innerHTML = `
      <strong>今天只做保底版也可以</strong>
      <span>${day.fallback}</span>
      <button type="button" id="fallbackComplete">按保底版完成</button>
    `;
    document.querySelector("#fallbackComplete").onclick = () => {
      state.done.add(day.id);
      saveDone();
      updateProgress();
      renderTabs();
      elements.completeNote.textContent = "已按保底版完成，可以在纸上打勾。";
    };
  };
  elements.completeButton.onclick = () => {
    state.done.add(day.id);
    saveDone();
    updateProgress();
    renderTabs();
    elements.completeNote.textContent = "今天已经完成，可以在纸上打勾。";
  };
  updateProgress();
}

async function loadUnit(unitId) {
  const unitEntry = state.manifest.units.find((unit) => unit.id === unitId);
  state.unitEntry = unitEntry || state.manifest.units[0];
  if (window.CHECKIN_STATIC?.units?.[state.unitEntry.id]) {
    state.data = window.CHECKIN_STATIC.units[state.unitEntry.id];
  } else {
    const response = await fetch(state.unitEntry.data);
    state.data = await response.json();
  }
  state.activeDayIndex = 0;
  loadDone();
  render();
}

async function init() {
  if (window.CHECKIN_STATIC?.manifest) {
    state.manifest = window.CHECKIN_STATIC.manifest;
  } else {
    const manifestResponse = await fetch("data/manifest.json");
    state.manifest = await manifestResponse.json();
  }
  const params = new URLSearchParams(window.location.search);
  const unitId = params.get("unit") || state.manifest.defaultUnit;
  await loadUnit(unitId);
}

init().catch(() => {
  document.body.innerHTML = "<main class='app-shell'><h1>加载失败</h1><p>请确认 English-Checkin.html 是最新版本，且 web/audio 文件夹没有被移动。</p></main>";
});

    </script>
  </body>
